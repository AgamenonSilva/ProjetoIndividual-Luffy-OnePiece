<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/imgs/logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luffy | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Monkey D. Luffy</h1>

            <div class="titulo">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white" onclick="abrirQuiz()">
                <h3>Quiz</h3>
            </div>
            <div class="btn-nav-white">
                <a href="">
                    <h3>Coleção de Cenas</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <a href="index.html">
                    <h3>Sair</h3>
                </a>
            </div>

        </div>

        <div class="dash">
            <div class="kpis">
                <div id="kpi_personagem"></div>
                <div id="kpi_episodio"></div>
                <div id="kpi_personalidade"></div>
            </div>
            <div class="area-graficos">
                <div class="grafico-card Personalidade">
                    <h2>Progresso na Jornada</h2>
                    <canvas id="graficoProgresso"></canvas>
                </div>

                <div class="grafico-card mini-card">

                    <div class="info-extra">
                        <p>
                            <strong>Arco Atual</strong><br>
                            <span id="texto_arco"></span>
                        </p>
                        <p>
                            <strong>Episódios Restantes</strong><br>
                            <span id="texto_restante"></span>
                        </p>
                    </div>
                </div>
            </div>


            <div id="quizModal" class="quiz-modal">

                <div class="quiz-box">

                    <h2 class="quiz-titulo">Perfil de Pirata</h2>

                    <div class="quiz-campo">Personagem favorito</div>
                    <input type="text" id="favPersonagem">

                    <div class="quiz-campo">Episódio atual</div>
                    <input type="number" id="episodioAtual">

                    <div class="quiz-campo">Personalidade do Luffy</div>
                    <select id="personalidadeLuffy">
                        <option value="Alegre">Alegre</option>
                        <option value="Corajoso">Corajoso</option>
                        <option value="Leal">Leal</option>
                        <option value="Teimoso">Teimoso</option>
                        <option value="Impulsivo">Impulsivo</option>
                        <option value="Determinado">Determinado</option>
                        <option value="PROTETOR">Protetor da tripulação</option>
                    </select>
                    <div class="botoesQuiz">
                        <button onclick="salvarQuiz()">Salvar Dados</button>
                        <button onclick="fecharQuiz()" style="background:red;">Fechar</button>
                    </div>
                </div>

            </div>
            <div class="area-graficos">

                <div class="grafico-card">
                    <h2>Progresso por Arco</h2>
                    <canvas id="graficoArcos"></canvas>
                </div>

                <div class="grafico-card2">
                    <h2>Perfil do Pirata</h2>
                    <canvas id="graficoPersonalidade"></canvas>
                </div>
            </div>
            <script>
                document.getElementById("b_usuario").innerHTML =
                    sessionStorage.NOME_USUARIO;

                let proximaAtualizacao;
                let chartProgresso;
                let chartArcos;
                let chartPersonalidade;

                window.onload = carregarGraficos;

                function carregarGraficos() {
                    atualizarKPIs();
                    let episodio =
                        Number(sessionStorage.getItem("episodioAtual"));

                    if (episodio) {
                        gerarGraficoArcos(episodio);
                    }
                    buscarHistorico();
                    carregarPersonalidade();
                }
                // O gráfico é construído com três funções:
                // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
                // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
                // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

                // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
                // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
                // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

                //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
                //     Para ajustar o "select", ajuste o comando sql em src/models
                function gerarGraficoProgresso(resposta) {
                    let ultimoEpisodio =
                        resposta[resposta.length - 1].episodioAtual;
                    let episodiosTotais = 1155;

                    let restante = episodiosTotais - ultimoEpisodio;

                    document.getElementById("texto_arco").innerHTML =
                        definirArco(ultimoEpisodio);

                    document.getElementById("texto_restante").innerHTML =
                        restante + " episódios";

                    let labels = [];

                    let dados = {
                        labels: labels,

                        datasets: [{
                            label: 'Episódios Assistidos',
                            data: [],
                            fill: true,
                            borderColor: 'gold',
                            backgroundColor: 'rgba(255,215,0,0.2)',
                            tension: 0.4
                        }]
                    };

                    for (let i = 0; i < resposta.length; i++) {

                        labels.push(resposta[i].data);

                        dados.datasets[0].data.push(
                            resposta[i].episodioAtual
                        );
                    }

                    labels.push("Atual");

                    dados.datasets[0].data.push(ultimoEpisodio);

                    if (chartProgresso == undefined) {
                        const config = {
                            type: 'line',
                            data: dados
                        };
                        chartProgresso = new Chart(
                            document.getElementById("graficoProgresso"),
                            config
                        );

                    } else {
                        chartProgresso.data.labels = dados.labels;
                        chartProgresso.data.datasets[0].data =
                            dados.datasets[0].data;
                        chartProgresso.update();
                    }
                }

                function gerarGraficoPersonalidade(resposta) {

                    let labels = [];

                    let dados = {
                        labels: labels,

                        datasets: [{
                            label: 'Personalidades do Luffy',
                            data: [],
                            backgroundColor: 'rgba(255,215,0,0.2)',
                            borderColor: 'gold',
                            borderWidth: 1,
                            pointBorderColor: 'gold',
                            pointRadius: 3,
                            pointBackgroundColor: 'white'
                        }]
                    };

                    for (let i = 0; i < resposta.length; i++) {

                        labels.push(resposta[i].personalidade);

                        dados.datasets[0].data.push(resposta[i].total);
                    }

                    if (chartPersonalidade == undefined) {
                        const config = {
                            type: 'radar',
                            data: dados,
                            options: {
                                responsive: true,

                                plugins: {
                                    legend: {
                                        labels: {
                                            color: "white",
                                            font: {
                                                size: 12
                                            }
                                        }
                                    }
                                },

                                scales: {
                                    r: {
                                        min: 0,
                                        max: 5,
                                        angleLines: {
                                            color: "rgba(255, 255, 255, 0.1)"
                                        },

                                        grid: {
                                            color: "rgba(255, 255, 255, 0.1)"
                                        },

                                        pointLabels: {
                                            color: "white",
                                            font: {
                                                size: 10
                                            }
                                        },

                                        ticks: {
                                            color: "gold",
                                            backdropColor: "transparent",
                                            font: {
                                                size: 5
                                            }
                                        }
                                    }
                                }
                            }
                        };
                        chartPersonalidade = new Chart(
                            document.getElementById("graficoPersonalidade"),
                            config
                        );
                    } else {
                        chartPersonalidade.data.labels =
                            dados.labels;
                        chartPersonalidade.data.datasets[0].data =
                            dados.datasets[0].data;

                        chartPersonalidade.update();
                    }
                }

                function gerarGraficoArcos(episodioAtual) {

                    let arcos = [

                        { nome: "East Blue", inicio: 1, fim: 61 },
                        { nome: "Alabasta", inicio: 62, fim: 143 },
                        { nome: "Skypiea", inicio: 144, fim: 206 },
                        { nome: "Davy Back Fight", inicio: 207, fim: 228 },
                        { nome: "Water 7", inicio: 229, fim: 263 },
                        { nome: "Enies Lobby", inicio: 264, fim: 336 },
                        { nome: "Thriller Bark", inicio: 337, fim: 381 },
                        { nome: "Sabaody Archipelago", inicio: 382, fim: 407 },
                        { nome: "Amazon Lily", inicio: 382, fim: 407 },
                        { nome: "Marineford", inicio: 408, fim: 516 },
                        { nome: "Dressrosa", inicio: 579, fim: 750 },
                        { nome: "Whole Cake", inicio: 783, fim: 891 },
                        { nome: "Wano", inicio: 892, fim: 1088 },
                        { nome: "Egghead", inicio: 1089, fim: 1155 }

                    ];

                    let labels = [];

                    let dados = {
                        labels: labels,

                        datasets: [{
                            label: 'Conclusão do Arco (%)',
                            data: [],
                            backgroundColor: [],
                            borderRadius: 10
                        }]
                    };

                    for (let i = 0; i < arcos.length; i++) {
                        dados.labels.push(arcos[i].nome);
                        let porcentagem = 0;
                        if (episodioAtual >= arcos[i].fim) {
                            porcentagem = 100;
                        } else if (
                            episodioAtual >= arcos[i].inicio &&
                            episodioAtual < arcos[i].fim
                        ) {

                            let totalArco =
                                arcos[i].fim - arcos[i].inicio;

                            let progressoAtual =
                                episodioAtual - arcos[i].inicio;

                            porcentagem =
                                (progressoAtual / totalArco) * 100;
                        }

                        else {

                            porcentagem = 0;
                        }

                        dados.datasets[0].data.push(porcentagem);

                        if (porcentagem >= 100) {
                            dados.datasets[0].backgroundColor.push("#22c55e");
                        } else if (porcentagem > 0) {
                            dados.datasets[0].backgroundColor.push("#facc15");
                        } else {
                            dados.datasets[0].backgroundColor.push("#374151");
                        }
                    }

                    if (chartArcos == undefined) {

                        const config = {
                            type: 'bar',
                            data: dados,
                            options: {
                                indexAxis: 'y',
                                responsive: true,
                                plugins: {
                                    legend: {
                                        labels: {
                                            color: "white",
                                            font: {
                                                size: 12
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    x: {
                                        max: 100,
                                        grid: {
                                            color: "rgba(255, 255, 255, 0.1)"
                                        },
                                        ticks: {
                                            color: "gold",
                                            font: {
                                                size: 10
                                            },
                                            callback: function (value) {
                                                return value + "%";
                                            }
                                        }
                                    },
                                    y: {
                                        grid: {
                                            display: false
                                        },
                                        ticks: {
                                            color: "white",
                                            font: {
                                                size: 10
                                            }
                                        }
                                    }
                                }
                            }
                        };
                        chartArcos = new Chart(
                            document.getElementById("graficoArcos"),
                            config
                        );
                    } else {
                        chartArcos.data.labels =
                            dados.labels;
                        chartArcos.data.datasets[0].data =
                            dados.datasets[0].data;
                        chartArcos.data.datasets[0].backgroundColor =
                            dados.datasets[0].backgroundColor;

                        chartArcos.update();
                    }
                }
                function carregarPersonalidade() {

                    fetch(`/quiz/estatisticas/${sessionStorage.ID_USUARIO}`)
                        .then(function (response) {
                            if (response.ok) {
                                response.json().then(function (dados) {
                                    gerarGraficoPersonalidade(dados);
                                });
                            } else {
                                console.log("Erro ao buscar dados");
                            }

                        });
                }
                function buscarHistorico() {

                    fetch(`/quiz/historico/${sessionStorage.ID_USUARIO}`)
                        .then(function (response) {

                            if (response.ok) {

                                response.json().then(function (resposta) {

                                    gerarGraficoProgresso(resposta);

                                });

                            } else {

                                console.log("Erro ao buscar histórico");

                            }
                        });
                }
                // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
                // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
                // A função *plotarGrafico* também invoca a função *atualizarGrafico*
                // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
                // buscando a última medida inserida em tabela contendo as capturas, 

                //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
                //     Para ajustar o "select", ajuste o comando sql em src/models
                function abrirQuiz() {
                    document.getElementById("quizModal").style.display = "flex";
                    document.getElementById("favPersonagem").value = sessionStorage.getItem("favPersonagem") || "";
                    document.getElementById("episodioAtual").value = sessionStorage.getItem("episodioAtual") || "";
                    document.getElementById("personalidadeLuffy").value = sessionStorage.getItem("personalidadeLuffy") || "";
                }
                function fecharQuiz() {
                    document.getElementById("quizModal").style.display = "none";
                }
                function salvarQuiz() {
                    fetch("/quiz/salvar", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            fkUsuario: sessionStorage.ID_USUARIO,
                            personagemFavorito: document.getElementById("favPersonagem").value,
                            episodioAtual: document.getElementById("episodioAtual").value,
                            personalidade: document.getElementById("personalidadeLuffy").value
                        })
                    }).then(function (res) {
                        if (res.ok) {
                            alert("Quiz salvo!");

                            sessionStorage.setItem("favPersonagem", document.getElementById("favPersonagem").value);
                            sessionStorage.setItem("episodioAtual", document.getElementById("episodioAtual").value);
                            sessionStorage.setItem("personalidadeLuffy", document.getElementById("personalidadeLuffy").value);
                            atualizarKPIs();

                            carregarPersonalidade();
                            carregarGraficos();

                            fecharQuiz();

                        } else {
                            alert("Erro ao salvar quiz.");
                        }
                    });
                }
                function atualizarKPIs() {

                    document.getElementById("kpi_personagem").innerHTML = `<strong>Personagem Favorito:</strong> <br>
        ${sessionStorage.getItem("favPersonagem") || "Nenhum personagem favorito selecionado"}`;
                    document.getElementById("kpi_episodio").innerHTML = `<strong>Episódio Atual:</strong> <br>
        ${sessionStorage.getItem("episodioAtual") || "Nenhum episódio selecionado"}`;
                    document.getElementById("kpi_personalidade").innerHTML = `<strong>Personalidade Mais Recente:</strong> <br>
        ${sessionStorage.getItem("personalidadeLuffy") || "Nenhuma personalidade selecionada"}`;
                }
                function definirArco(episodio) {
                    if (episodio >= 1 && episodio <= 61) {
                        return "East Blue";
                    } else if (episodio <= 143) {
                        return "Alabasta";
                    } else if (episodio <= 206) {
                        return "Skypiea";
                    } else if (episodio <= 228) {
                        return "Davy Back Fight";
                    } else if (episodio <= 263) {
                        return "Water 7";
                    } else if (episodio <= 336) {
                        return "Enies Lobby";
                    } else if (episodio <= 381) {
                        return "Thriller Bark";
                    } else if (episodio <= 407) {
                        return "Sabaody Archipelago";
                    } else if (episodio <= 421) {
                        return "Amazon Lily";
                    } else if (episodio <= 458) {
                        return "Impel Down";
                    } else if (episodio <= 516) {
                        return "Marineford";
                    } else if (episodio <= 578) {
                        return "Fishman Island";
                    } else if (episodio <= 628) {
                        return "Punk Hazard";
                    } else if (episodio <= 750) {
                        return "Dresrossa";
                    } else if (episodio <= 782) {
                        return "Zou";
                    } else if (episodio <= 891) {
                        return "Whole Cake Island";
                    } else if (episodio <= 1088) {
                        return "Wano";
                    } else if (episodio <= 1155) {
                        return "Egghead";
                    } else {
                        return "Elbaph";
                    }
                }

            </script>
</body>

</html>
