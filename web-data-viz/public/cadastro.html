<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Luffy | Cadastro </title>

  <link rel="stylesheet" href="css/styleCadastro.css">
  <link rel="icon" href="assets/imgs/logo.png">
</head>

<body>

  <div class="header">
    <div class="container">
      <div class="logo">
        <img src="assets/imgs/logo.png">
        <h1 class="titulo">Luffy</h1>
      </div>
      <ul class="navbar">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li>
          <a href="dashboards.html">Dashboards</a>
        </li>
        <li><a> | </a></li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
      <div class="avatar">
        <img src="assets/imgs/zoro.png" alt="">
      </div>
    </div>
  </div>


  <div class="containerCadastro">

    <div class="textoDireitaCad">
      <h1>Bem-vindo!</h1>
      <p>Acompanhe os detalhes sobre o mundo em que Luffy vive <br>
        E conheça mais sobre o personagem que se tornará o Rei dos Piratas!</p>
    </div>
    <div class="textoEsquerdaCad">
      <div class="campo">
        <span>Nome Completo *</span>
        <input type="text" id="ipt_nome" placeholder="Digite seu nome completo" oninput="validarNome()">
        <div class="div_erro" id="div_nome"></div>
      </div>

      <div class="campo">
        <span>E-mail *</span>
        <input type="text" id="ipt_email" placeholder="nome@dominio.com" oninput="validarEmail()">
        <div class="div_erro" id="div_email"></div>
      </div>

      <div class="campo">
        <span>CPF *</span>
        <input type="text" id="ipt_cpf" placeholder="000.000.000-00" oninput="validarCpf()">
        <div class="div_erro" id="div_cpf"></div>
      </div>

      <div class="campo">
        <span>Senha *</span>
        <input type="password" id="ipt_senha" placeholder="Digite sua senha" oninput="validarSenha()">
        <div class="div_erro" id="div_senha"></div>
      </div>

      <div class="campo">
        <span>Confirmar Senha *</span>
        <input type="password" id="ipt_confSenha" placeholder="Confirme sua senha" oninput="validarConfSenha()">
        <div class="div_erro" id="div_confSenha"></div>
      </div>

      <button onclick="cadastrar()" type="button" class="btn-cadastro">Cadastrar-se</button>

      <div class="ja-tenho-conta">
        Já possui uma conta? <a href="login.html">Fazer Login</a>
      </div>
    </div>

  </div>
</body>

</html>
<script>
  let validacaoNome = false;
  let validacaoEmail = false;
  let validacaoCpf = false;
  let validacaoSenha = false;
  let validacaoConfSenha = false;

  function validarNome() {
    let nome = ipt_nome.value
    
    if (nome.length >= 3) {
        validacaoNome = true;
        div_nome.innerHTML = "";
    } else {
        validacaoNome = false;
        div_nome.innerHTML = 'Digite um nome válido (mínimo 3 caracteres)';
    }
}
  function validarEmail() {
    let email = ipt_email.value;
    if (email.includes("@") && email.includes(".")) {
      validacaoEmail = true;
      div_email.innerHTML = "";
    } else {
      validacaoEmail = false;
      div_email.innerHTML = "Digite um e-mail válido";
    }
  }
  function validarCpf() {
    let cpf = ipt_cpf.value;
    if (cpf.length === 14) {
      validacaoCpf = true;
      div_cpf.innerHTML = "";
    } else {
      validacaoCpf = false;
      div_cpf.innerHTML = "Digite um CPF válido (formato: 000.000.000-00)";
    }
  }
  function validarSenha() {
    let senha = ipt_senha.value;
    if (senha.length >= 6) {
      validacaoSenha = true;
      div_senha.innerHTML = "";
    } else {
      validacaoSenha = false;
      div_senha.innerHTML = "A senha deve conter pelo menos 6 caracteres";
    }
  }
  function validarConfSenha() {
    let confSenha = ipt_confSenha.value;
    if (confSenha === ipt_senha.value) {
      validacaoConfSenha = true;
      div_confSenha.innerHTML = "";
    } else {
      validacaoConfSenha = false;
      div_confSenha.innerHTML = "As senhas não coincidem";
    }
  }

function cadastrar() {

  if (!validacaoNome || !validacaoEmail || !validacaoCpf || !validacaoSenha || !validacaoConfSenha) {
    alert("Preencha todos os campos corretamente!");
    return;
  }

  let Nome = ipt_nome.value;
  let Email = ipt_email.value;
  let CPF = ipt_cpf.value;
  let Senha = ipt_senha.value;

  fetch("/usuarios/cadastrar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nomeServer: Nome,
      emailServer: Email,
      cpfServer: CPF,
      senhaServer: Senha
    })
  })
    .then(function(resposta) {
      if (resposta.ok) {
        alert("Cadastro realizado com sucesso!");

        setTimeout(function() {
          window.location.href = "login.html";
        }, 2000);

      } else {

        alert("Houve um erro ao tentar realizar o cadastro!");
      }
    })

    .catch(function (resposta){
      console.log(`#ERRO: ${resposta}`);
    });

}
</script>
