<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Luffy | Login </title>

  <link rel="stylesheet" href="css/styleLogin.css">
  <link rel="icon" href="assets/imgs/logo.png">
</head>

<body>

  <div class="header">
    <div class="container">
      <div class="logo">
        <img src="assets/imgs/logo.png">
        <h1 class="titulo">Luffy</h1>
      </div>
      <ul class="navbar">
        <li>
          <a href="index.html">Home</a>
        </li>
        <li>
          <a href="dashboardLUFFY.html">Dashboards</a>
        </li>
        <li><a> | </a></li>
        <li class="agora">
          <a href="#">Login</a>
        </li>
        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>
      </ul>
      <div class="avatar">
        <img src="assets/imgs/sanji.png" alt="">
      </div>
    </div>
  </div>


  <div class="containerLogin">

    <div class="textoDireitaLogin">
      <h1>Bem-vindo de Volta!</h1>
      <p>Entre novamente e continue sua jornada em busca do One Piece!</p>
    </div>
    <div class="textoEsquerdaLogin">

      <div class="campo">
        <span>E-mail *</span>
        <input type="text" id="ipt_email" placeholder="nome@dominio.com">
      </div>

      <div class="campo">
        <span>Senha *</span>
        <input type="password" id="ipt_pass" placeholder="Digite sua senha">
      </div>

      <button onclick="fazerLogin()" type="button" class="btn-login">Fazer Login</button>

      <div class="nao-tenho-conta">
        Não possui uma conta? <a href="cadastro.html">Cadastrar-se</a>
      </div>
    </div>

  </div>
</body>

</html>
<script>
  function fazerLogin() {

    let Email = ipt_email.value;
    let Pass = ipt_pass.value;

    if (Email == "" || Pass == "") {
      alert("Preencha todos os campos!");
      return;
    }

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        emailServer: Email,
        senhaServer: Pass
      })

    })

      .then(function (resposta) {

        console.log("Resposta:", resposta);

        if (resposta.ok) {

          resposta.json().then(function (json) {

            console.log(json);

            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome || json.nomeUsuario;
            sessionStorage.ID_USUARIO = json.id || json.idUsuario;

            alert("Login realizado com sucesso!");

            window.location = "dashboardLUFFY.html";

          });

        } else {

          alert("Email ou senha inválidos!");

        }

      })

      .catch(function (erro) {
        console.log(erro);
      });

  }
</script>
